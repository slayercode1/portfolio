name: Deploy Portfolio to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: slayercode1/portfolio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml"
          target: "/tmp/portfolio-deploy"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_FILE: ${{ secrets.ENV }}
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: ENV_FILE,GH_TOKEN,GH_USER
          script: |
            # Create directory if not exists
            if [ ! -d "/var/html/portfolio" ]; then
              sudo mkdir -p /var/html/portfolio
              sudo chown -R $USER:$USER /var/html/portfolio
            fi

            # Copy compose file from temp to target
            cp /tmp/portfolio-deploy/docker-compose.prod.yml /var/html/portfolio/docker-compose.yml
            rm -rf /tmp/portfolio-deploy

            # Create .env file from secret
            echo "${ENV_FILE}" > /var/html/portfolio/.env

            # Go to directory and deploy
            cd /var/html/portfolio

            # Login to GitHub Container Registry
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_USER}" --password-stdin

            # Pull and restart containers
            docker compose pull
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            echo "Deployment complete!"
