services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  # One-shot: runs migrations then exits
  migrate:
    image: ghcr.io/slayercode1/portfolio:migrate-latest
    container_name: portfolio-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-network

  web:
    image: ghcr.io/slayercode1/portfolio:latest
    container_name: portfolio-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - db-network
      - caddy-net

volumes:
  postgres_data:
    driver: local

networks:
  db-network:
    driver: bridge
    internal: true
  caddy-net:
    external: true
